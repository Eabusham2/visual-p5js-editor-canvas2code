<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape Designer → p5.js Code</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%231a1a2e'/><rect x='9' y='14' width='22' height='18' rx='3' fill='%237c3aed'/><circle cx='44' cy='22' r='12' fill='%233b82f6'/><polygon points='10,56 30,56 20,40' fill='%2322c55e'/><circle cx='44' cy='46' r='9' fill='%23fbbf24'/></svg>">
<style>
:root{--bg:#0c0c14;--bg2:#141420;--bg3:#1c1c30;--bg4:#252545;--accent:#7c3aed;--accent2:#9b5dff;--text:#c8cad0;--dim:#555;--border:#252540;--green:#22c55e;--red:#ef4444;--yellow:#fbbf24;--blue:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* TOOLBAR */
.toolbar{position:relative;z-index:100;display:flex;align-items:center;gap:2px;padding:4px 8px;background:linear-gradient(180deg,#1a1a2e,#151528);border-bottom:1px solid var(--border);flex-wrap:wrap;min-height:40px}
.tg{display:flex;align-items:center;gap:2px;padding:0 6px;border-right:1px solid #35355a}.tg:last-child{border:none}
.tb{width:32px;height:32px;border:2px solid transparent;border-radius:6px;background:var(--bg4);color:#888;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative}
.tb:hover{background:#3a3a60;border-color:#5555aa;color:#eee;transform:translateY(-1px);z-index:9999}
.tb.active{background:var(--accent);border-color:var(--accent2);color:#fff;box-shadow:0 2px 12px rgba(124,58,237,.4)}

/* TOOLTIPS */
.tb .tp,.abtn .tp{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#0a0a14;color:#ccc;padding:6px 10px;border-radius:6px;font-size:9px;white-space:nowrap;z-index:9999;pointer-events:none;opacity:0;visibility:hidden;transition:opacity .15s,visibility .15s;border:1px solid #2a2a4a;box-shadow:0 4px 16px rgba(0,0,0,.5);line-height:1.4;text-align:left}
.tb .tp::before,.abtn .tp::before{content:none}
.tb .tp.tp-show,.abtn .tp.tp-show{opacity:1;visibility:visible}
.tp-arrow{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:#2a2a4a}
.tp b{color:var(--accent2)}.tp kbd{background:var(--bg4);padding:1px 4px;border-radius:3px;font-size:8px;color:#999;font-family:monospace}

.toolbar label{font-size:10px;display:flex;align-items:center;gap:3px;color:#666}
.toolbar input[type="color"]{width:24px;height:24px;border:2px solid var(--bg4);border-radius:5px;cursor:pointer;background:none;padding:0;transition:border-color .15s}
.toolbar input[type="color"]:hover{border-color:var(--accent)}
.toolbar input[type="color"]::-webkit-color-swatch-wrapper{padding:1px}
.toolbar input[type="color"]::-webkit-color-swatch{border-radius:3px;border:none}
.toolbar input[type="number"],.toolbar input[type="text"]{width:44px;height:24px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:0 4px;font-size:10px;text-align:center;transition:border-color .15s}
.toolbar input:focus{border-color:var(--accent);outline:none}
.toolbar select{height:24px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:10px;padding:0 2px}
.abtn{height:28px;padding:0 8px;border:none;border-radius:5px;color:#fff;font-size:10px;cursor:pointer;font-weight:600;position:relative;transition:all .15s}
.abtn:hover{filter:brightness(1.3);transform:translateY(-1px);z-index:9999}
.abtn-fixed{min-width:36px;width:36px;padding:0;display:inline-flex;align-items:center;justify-content:center}
.chk{display:flex;align-items:center;gap:2px;font-size:10px;color:#777;cursor:pointer;transition:color .15s}
.chk:hover{color:#aaa}
.chk input{accent-color:var(--accent);width:13px;height:13px}
.mm{display:flex;align-items:center;background:var(--bg);border:1px solid var(--accent);border-radius:5px;overflow:visible}
.mm button{position:relative;padding:3px 8px;border:none;font-size:9px;font-weight:700;cursor:pointer;transition:all .12s}
.mm button.on{background:var(--accent);color:#fff}
.mm button.off{background:transparent;color:#666}
.mm button .tp{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#0a0a14;color:#ccc;padding:6px 10px;border-radius:6px;font-size:9px;white-space:nowrap;z-index:9999;pointer-events:none;opacity:0;visibility:hidden;transition:opacity .15s,visibility .15s;border:1px solid #2a2a4a;box-shadow:0 4px 16px rgba(0,0,0,.5);line-height:1.4;text-align:left}
.mm button .tp::before{content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:#2a2a4a}
.mm button:hover .tp{opacity:1;visibility:visible}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden;min-height:0;position:relative;z-index:10}
.cwrap{flex:1;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.ws-stage{position:absolute;inset:0;width:100%;height:100%;transform-origin:0 0;will-change:transform}
.ws-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:12px;box-sizing:border-box}
.cbox{position:relative;box-shadow:0 0 40px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.03);border-radius:2px;flex-shrink:0}
canvas#cv{display:block;border-radius:2px;image-rendering:-webkit-optimize-contrast}
.badge{position:absolute;top:6px;left:6px;background:rgba(124,58,237,.88);color:#fff;padding:3px 8px;border-radius:5px;font-size:9px;font-weight:600;pointer-events:none;z-index:10;display:none;backdrop-filter:blur(4px)}
.hud{position:absolute;top:6px;z-index:20;display:flex;align-items:center;gap:4px;font-size:10px;color:#aaa;background:rgba(10,10,20,.9);padding:3px 8px;border-radius:6px;border:1px solid #252540;backdrop-filter:blur(4px);pointer-events:auto}
.hud-left{left:10px}
.hud-right{right:10px}
.hud-zoom{cursor:pointer}
.hud-zoom button{border:none;background:transparent;color:#aaa;font-size:10px;cursor:pointer;padding:0 4px}
.hud-zoom button:hover{color:#fff}
/* SIDEBAR */
.sidebar{width:264px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.pnl{padding:8px;border-bottom:1px solid var(--border)}
.pnl h3{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;justify-content:space-between}
.pr{display:flex;align-items:center;gap:4px;margin-bottom:5px;flex-wrap:wrap}
.pr label{font-size:9px;color:#555;min-width:16px}
.pr input[type="number"],.pr input[type="text"]{width:48px;height:22px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:0 4px;font-size:10px;transition:border-color .15s}
.pr input:focus{border-color:var(--accent);outline:none}
.pr input[type="color"]{width:26px;height:22px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:none}
.pr input[type="range"]{flex:1;accent-color:var(--accent);height:3px}
.pr input[type="checkbox"]{accent-color:var(--accent);width:12px;height:12px}
.pr span.v{font-size:9px;color:var(--accent);min-width:22px;text-align:right}
.pr select{height:22px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:10px}
.nosel{color:#3a3a5a;font-size:10px;text-align:center;padding:14px 0}
.pacts{display:flex;gap:2px;margin-top:6px}
.pacts button{flex:1;height:24px;border:1px solid var(--border);border-radius:5px;background:var(--bg4);color:#aaa;font-size:9px;cursor:pointer;transition:all .12s}
.pacts button:hover{background:var(--accent);border-color:var(--accent);color:#fff;transform:translateY(-1px)}
.pacts .dng:hover{background:var(--red);border-color:var(--red)}
.lock-btn{width:22px;height:22px;border:1px solid var(--border);border-radius:4px;background:var(--bg4);color:#666;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.lock-btn.on{background:var(--accent);color:#fff;border-color:var(--accent2)}

/* LAYERS & TEMPLATES */
.lwrap{flex:1;overflow-y:auto;padding:0 8px 8px}
.li{display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:5px;cursor:pointer;font-size:10px;border:1px solid transparent;margin-bottom:1px;transition:all .1s}
.li:hover{background:var(--bg3)}.li.act{background:var(--bg3);border-color:var(--accent)}.li.drag-over{border-top:2px solid var(--accent2)}.li[draggable]{cursor:grab}.li.dragging{opacity:.4}
.li-ico{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;color:#fff}
.li-nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-acts{display:flex;gap:1px;flex-shrink:0}
.li-acts button{border:none;background:none;color:#555;cursor:pointer;font-size:10px;padding:0 2px;transition:color .1s}
.li-acts button:hover{color:#fff}
.tpl{display:flex;align-items:center;gap:4px;padding:4px 6px;border-radius:5px;font-size:10px;border:1px solid transparent;margin-bottom:2px;background:var(--bg)}
.tpl.act{border-color:var(--blue)}
.tpl span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#666;cursor:pointer}
.tpl button{border:none;background:none;color:#555;cursor:pointer;font-size:10px;padding:0 2px}.tpl button:hover{color:#fff}

/* COLOR PICKER */
.cpick .cr{display:flex;align-items:center;gap:3px;margin-bottom:3px}
.cpick .cr label{font-size:9px;color:#555;width:14px;text-align:right;flex-shrink:0;font-weight:600}
.cpick .cr input[type="range"]{flex:1;height:3px;accent-color:var(--accent)}
.cpick .cr input[type="number"]{width:36px;height:20px;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);font-size:9px;text-align:center;flex-shrink:0}
.hex-row{display:flex;align-items:center;gap:4px;margin-top:2px}
.hex-row label{font-size:11px;color:#555;font-weight:700}
.hex-row input{width:62px;height:22px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--accent2);font-size:10px;font-family:monospace;padding:0 4px;letter-spacing:.5px}
.hex-row input:focus{border-color:var(--accent)}
.cprev{width:22px;height:22px;border-radius:5px;border:2px solid var(--bg4);flex-shrink:0;transition:border-color .15s}
.cprev:hover{border-color:var(--accent)}
.cinfo{font-size:8px;color:#444;flex:1;text-align:right}

/* RESIZER */
.resizer{height:7px;background:var(--bg3);cursor:ns-resize;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .12s}
.resizer:hover,.resizer.on{background:var(--accent)}
.resizer::after{content:'⋯';color:#555;font-size:10px;letter-spacing:2px}

/* CODE */
.codesec{background:var(--bg2);display:flex;flex-direction:column;flex-shrink:0;min-height:36px;overflow:hidden;position:relative;z-index:20}
.codehd{display:flex;align-items:center;justify-content:space-between;padding:4px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.codehd-btns{display:flex;align-items:center;gap:4px}
.codehd span{font-size:11px;font-weight:600;color:var(--accent)}
.codehd button{height:26px;padding:0 10px;border:none;border-radius:5px;background:var(--accent);color:#fff;font-size:10px;cursor:pointer;font-weight:600;transition:all .15s}
.codehd button:hover{background:var(--accent2);transform:translateY(-1px)}
.codehd button.ok{background:var(--green)}
.codeout{flex:1;overflow:auto;padding:8px 14px;font-family:'Fira Code','Cascadia Code',monospace;font-size:11px;line-height:1.5;color:#a9b1d6;white-space:pre;tab-size:2;background:var(--bg)}
.codeout .kw{color:#bb9af7}.codeout .fn{color:#7aa2f7}.codeout .num{color:#ff9e64}.codeout .cmt{color:#565f89;font-style:italic}.codeout .str{color:#9ece6a}

.tip{position:fixed;padding:3px 7px;background:var(--bg4);color:var(--text);font-size:9px;border-radius:4px;pointer-events:none;z-index:9999;white-space:nowrap;border:1px solid #333;display:none}
#textEditOverlay{position:absolute;left:0;top:0;pointer-events:none;z-index:15;display:none}
#textEditOverlay.on{display:block}
#textEditOverlay.resizing *{pointer-events:none !important}
.textEditEdge{position:absolute;pointer-events:none;z-index:18;cursor:default;width:0;height:0}
#textEditEdgeL{left:0;top:0;width:0;height:0}
#textEditEdgeR{right:0;top:0;width:0;height:0}
#textEditEdgeT{left:0;top:0;width:0;height:0}
#textEditEdgeB{left:0;bottom:0;width:0;height:0}
#textEditOverlay textarea{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:auto;margin:0;padding:0;border:none;background:transparent;color:transparent;caret-color:auto;resize:none;outline:none;box-sizing:border-box;overflow:hidden;user-select:text;-webkit-user-select:text;-moz-user-select:text}
#textEditOverlay textarea::selection,#textEditOverlay textarea::-moz-selection{background:#7c3aed;color:#fff;-webkit-text-fill-color:#fff}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#3a3a60}

/* ARTBOARD SYSTEM */
.abbar{display:flex;align-items:center;gap:4px;padding:4px 8px;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0;z-index:50;min-height:36px;overflow-x:hidden}
.abtabs{display:flex;align-items:center;gap:3px;overflow-x:auto;flex:1;min-width:0;padding-bottom:2px}
.abtab{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:var(--bg4);border:1px solid var(--border);border-radius:5px 5px 0 0;cursor:pointer;font-size:10px;color:#888;white-space:nowrap;transition:all .12s;user-select:none;flex-shrink:0}
.abtab.abt-act{background:var(--accent);border-color:var(--accent2);color:#fff}
.abtab:hover:not(.abt-act){background:var(--bg3);color:#ccc}
.abtab-close{border:none;background:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:11px;padding:0 1px;line-height:1;transition:color .1s}
.abtab-close:hover{color:#fff}
.ab-addbtn{padding:2px 9px;border:1px dashed #444;border-radius:5px;background:transparent;color:#666;cursor:pointer;font-size:14px;transition:all .12s;flex-shrink:0}
.ab-addbtn:hover{border-color:var(--accent);color:var(--accent)}
.ab-modebar{display:flex;align-items:center;gap:3px;margin-left:auto;flex-shrink:0}
.ab-mbtn{padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg4);color:#666;font-size:9px;cursor:pointer;font-weight:600;transition:all .12s}
.ab-mbtn.abm-on{background:var(--accent);border-color:var(--accent2);color:#fff}
.ab-mbtn:hover:not(.abm-on){border-color:#555;color:#aaa}
/* SPLIT */
.ab-split-wrap{flex:1;display:none;flex-direction:row;overflow-x:auto;overflow-y:hidden;min-height:0}
.ab-split-pane{display:flex;flex-direction:column;flex-shrink:0;position:relative;min-width:200px;overflow:hidden}
.ab-split-pane.absp-act{outline:2px solid var(--accent);outline-offset:-2px;z-index:1}
.ab-split-label{font-size:9px;color:#666;padding:2px 6px;background:var(--bg3);border-bottom:1px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;gap:4px;user-select:none}
.ab-split-label:hover{color:#ccc}
.ab-split-label-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ab-split-cwrap{flex:1;overflow:hidden;position:relative;min-height:0;display:flex;flex-direction:column}
.ab-split-zoom{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);display:flex;gap:2px;z-index:20;background:rgba(10,10,20,.85);border-radius:4px;padding:2px 5px;border:1px solid #2a2a4a;pointer-events:auto}
.ab-split-zoom button{border:none;background:none;color:#aaa;font-size:9px;cursor:pointer;padding:1px 4px}.ab-split-zoom button:hover{color:#fff}
.ab-split-divider{width:6px;flex-shrink:0;background:var(--bg3);cursor:ew-resize;border-left:1px solid var(--border);border-right:1px solid var(--border);transition:background .12s}
.ab-split-divider:hover,.ab-split-divider.absd-on{background:var(--accent)}
/* BROWSER */
.ab-browser-wrap{flex:1;display:none;position:relative;overflow:hidden;background:#07070f}
.ab-browser-stage{position:absolute;transform-origin:0 0;will-change:transform}
.ab-browser-ab{position:absolute;border:1px solid var(--border);border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,.4);background:var(--bg2);overflow:hidden}
.ab-browser-ab.abb-act{border-color:var(--accent);box-shadow:0 4px 20px rgba(124,58,237,.3)}
.ab-browser-hdr{padding:3px 8px;background:var(--bg3);border-bottom:1px solid var(--border);cursor:grab;display:flex;align-items:center;gap:6px;user-select:none}
.ab-browser-hdr:active{cursor:grabbing}
.ab-browser-hdr span{font-size:10px;color:#aaa;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ab-browser-hdr button{border:none;background:none;color:#555;cursor:pointer;font-size:10px;padding:0 2px;transition:color .1s}
.ab-browser-hdr button:hover{color:#fff}
.ab-browser-canvas-wrap{position:relative;overflow:hidden}
.ab-browser-zoombar{position:absolute;bottom:8px;right:8px;display:flex;gap:3px;z-index:10}
.ab-browser-zoombar button{padding:2px 7px;border:1px solid var(--border);border-radius:4px;background:var(--bg4);color:#aaa;font-size:10px;cursor:pointer;transition:all .12s}
.ab-browser-zoombar button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
/* cwrap inside split/browser modes */
.ab-split-cwrap .cwrap,.ab-browser-canvas-wrap .cwrap{display:flex!important;flex:1;width:100%;height:100%;position:relative;min-height:0}
.ab-split-pane{position:relative}
.ab-split-preview-wrap{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;background:var(--bg);padding:8px;box-sizing:border-box;cursor:pointer;min-height:0}
.ab-split-preview-canvas{display:block;max-width:100%;height:auto;border:1px solid var(--border)}
</style>
</head>
<body>

<div class="toolbar">
 <div class="tg">
  <button class="tb active" data-tool="select"><span>↖</span><div class="tp"><b>Select</b><br>Click to select, drag to move, grab handles to resize.<br><kbd>V</kbd></div></button>
  <button class="tb" data-tool="rect"><span>▭</span><div class="tp"><b>Rectangle</b><br>Drag to draw. Shift constrains ratio.<br><kbd>R</kbd></div></button>
  <button class="tb" data-tool="square"><span>□</span><div class="tp"><b>Square</b><br>Always equal Width & Height.<br><kbd>S</kbd></div></button>
  <button class="tb" data-tool="ellipse"><span>⬮</span><div class="tp"><b>Ellipse</b><br>Independent Width & Height oval.<br><kbd>E</kbd></div></button>
  <button class="tb" data-tool="circle"><span>◯</span><div class="tp"><b>Circle</b><br>Perfect circle by diameter.<br><kbd>C</kbd></div></button>
  <button class="tb" data-tool="triangle"><span>△</span><div class="tp"><b>Triangle</b><br>Drag to create, then reshape vertices.<br><kbd>T</kbd></div></button>
  <button class="tb" data-tool="line"><span>╱</span><div class="tp"><b>Line</b><br>Draw between two endpoints.<br><kbd>L</kbd></div></button>
  <button class="tb" data-tool="arc"><span>◠</span><div class="tp"><b>Arc</b><br>Partial ellipse with start/end angle.<br><kbd>A</kbd></div></button>
  <button class="tb" data-tool="point"><span>•</span><div class="tp"><b>Point</b><br>Single point, size = strokeWeight.<br><kbd>.</kbd></div></button>
  <button class="tb" data-tool="polygon"><span>⬡</span><div class="tp"><b>Polygon</b><br>N-sided regular polygon (3–30).<br><kbd>P</kbd></div></button>
  <button class="tb" data-tool="star"><span>★</span><div class="tp"><b>Star</b><br>N-pointed star with inner/outer radius.<br><kbd>*</kbd></div></button>
  <button class="tb" data-tool="pen"><span>✒</span><div class="tp"><b>Bezier Pen</b><br>Click corners, drag for smooth curves.<br>Click start point to close. Double-click path to add point.<br><kbd>N</kbd></div></button>
  <button class="tb" data-tool="linepen"><span>✏</span><div class="tp"><b>Line Pen</b><br>Straight-line vertices. Click start to close or dbl-click.<br>Double-click path to add point.<br><kbd>K</kbd></div></button>
  <button class="tb" data-tool="brush"><span>🖌</span><div class="tp"><b>Brush</b><br>Freehand drawing with circle/square stamps.<br><kbd>B</kbd></div></button>
  <button class="tb" data-tool="pixel"><span>▦</span><div class="tp"><b>Pixel Art</b><br>Paint grid cells. Right-click erases.<br><kbd>X</kbd></div></button>

<script>
let shapes=[],selId=null,hovPt=null,tool='select',hovShapeId=null;
let CW=800,CH=500,bgColor='#f0f0f0',uid=1,updUI=false;
let zoom=1,panX=0,panY=0,isPanning=false,panSX=0,panSY=0,panOX=0,panOY=0;
const MIN_ZOOM=0.25,MAX_ZOOM=4;
let snapOn=true,showGrid=true,showPts=true,gradGlobal=true,colorMode='rgb',angleMode='deg';
let gridSz=50,gridOpacity=12,mode='idle',dragPtI=-1,startMX,startMY,dragOX,dragOY,dragOrig=null;
let penPts=[],penDrag=null,penPrev=null,penClosing=false;
let linePenPts=[];
let undoStack=[],redoStack=[],snapGuides={v:[],h:[]};
let tplImgs=[],selImgI=-1,imgDrag=null,pixelLayer=null,pixelErase=false,pxHov=null;
let brushActive=false,resizeHandle=null,resizeOrig=null;
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const tipEl=document.getElementById('tip'),badgeEl=document.getElementById('badge');
const cbox=document.querySelector('.cbox');
const cwrap=document.getElementById('cwrap');
const wsStage=document.getElementById('wsStage');
const wsInner=document.querySelector('.ws-inner');
let textEditShapeId=null,textEditPrevTxt=null,textEditCursorBlink=true,textEditCursorBlinkTimer=null;
const SD=8,PR=5,PHR=8,PHT=11,RH=6;
let outlinePad=6,showOutline=true,defaultTextGap=20,lastMousePos=null;

const STORAGE_KEY='shapeDesignerState';
const DEFAULT_OPTIONS={CW:800,CH:500,bgColor:'#f0f0f0',dFill:'#4a90d9',dStr:'#222222',dWt:2,nSides:6,nStarP:5,starIn:40,arcS:0,arcE:180,arcM:'PIE',brSz:6,brSh:'circle',txtFont:'Arial',showOutline:true,outlinePad:6,snapOn:true,showPts:true,showGrid:true,gridSz:50,gridOpacity:12,colorMode:'rgb',angleMode:'deg'};

function getOptionsFromDOM(){
  const o={};
  o.CW=cl(+(document.getElementById('cW')&&document.getElementById('cW').value)||800,100,2000);
  o.CH=cl(+(document.getElementById('cH')&&document.getElementById('cH').value)||500,100,2000);
  o.bgColor=(document.getElementById('bgC')&&document.getElementById('bgC').value)||'#f0f0f0';
  o.dFill=(document.getElementById('dFill')&&document.getElementById('dFill').value)||'#4a90d9';
  o.dStr=(document.getElementById('dStr')&&document.getElementById('dStr').value)||'#222222';
  o.dWt=+(document.getElementById('dWt')&&document.getElementById('dWt').value)||2;
  o.nSides=+(document.getElementById('nSides')&&document.getElementById('nSides').value)||6;
  o.nStarP=+(document.getElementById('nStarP')&&document.getElementById('nStarP').value)||5;
  o.starIn=+(document.getElementById('starIn')&&document.getElementById('starIn').value)||40;
  o.arcS=+(document.getElementById('arcS')&&document.getElementById('arcS').value)||0;
  o.arcE=+(document.getElementById('arcE')&&document.getElementById('arcE').value)||180;
  o.arcM=(document.getElementById('arcM')&&document.getElementById('arcM').value)||'PIE';
  o.brSz=+(document.getElementById('brSz')&&document.getElementById('brSz').value)||6;
  o.brSh=(document.getElementById('brSh')&&document.getElementById('brSh').value)||'circle';
  o.txtFont=(document.getElementById('txtFont')&&document.getElementById('txtFont').value)||'Arial';
  o.showOutline=!!(document.getElementById('oOutline')&&document.getElementById('oOutline').checked);
  o.outlinePad=cl(+(document.getElementById('outlinePadN')&&document.getElementById('outlinePadN').value)||6,0,20);
  o.snapOn=!!(document.getElementById('oSnap')&&document.getElementById('oSnap').checked);
  o.showPts=!!(document.getElementById('oPts')&&document.getElementById('oPts').checked);
  o.showGrid=!!(document.getElementById('oGrid')&&document.getElementById('oGrid').checked);
  o.gridSz=cl(+(document.getElementById('gridSz')&&document.getElementById('gridSz').value)||50,5,200);
  o.gridOpacity=cl(+(document.getElementById('gridOpN')&&document.getElementById('gridOpN').value)||12,0,100);
  o.colorMode=document.querySelector('#mm button.on')?document.querySelector('#mm button.on').dataset.m||'rgb':'rgb';
  o.angleMode=document.querySelector('#angMM button.on')?document.querySelector('#angMM button.on').dataset.a||'deg':'deg';
  return o;
}

function applyOptionsToDOM(opt){
  const o=opt||DEFAULT_OPTIONS;
  CW=cl(+o.CW||800,100,2000);CH=cl(+o.CH||500,100,2000);bgColor=o.bgColor||'#f0f0f0';
  if(cv){cv.width=CW;cv.height=CH;}
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};
  const setChk=(id,v)=>{const el=document.getElementById(id);if(el)el.checked=!!v;};
  set('cW',CW);set('cH',CH);set('bgC',bgColor);
  set('dFill',o.dFill||'#4a90d9');set('dStr',o.dStr||'#222222');set('dWt',o.dWt!=null?o.dWt:2);
  set('nSides',o.nSides!=null?o.nSides:6);set('nStarP',o.nStarP!=null?o.nStarP:5);set('starIn',o.starIn!=null?o.starIn:40);
  set('arcS',o.arcS!=null?o.arcS:0);set('arcE',o.arcE!=null?o.arcE:180);
  const arcM=document.getElementById('arcM');if(arcM)arcM.value=o.arcM||'PIE';
  set('brSz',o.brSz!=null?o.brSz:6);
  const brSh=document.getElementById('brSh');if(brSh)brSh.value=o.brSh||'circle';
  const txtFont=document.getElementById('txtFont');if(txtFont)txtFont.value=o.txtFont||'Arial';
  showOutline=!!(o.showOutline!==false);outlinePad=cl(o.outlinePad!=null?o.outlinePad:6,0,20);
  setChk('oOutline',showOutline);set('outlinePadR',outlinePad);set('outlinePadN',outlinePad);
  snapOn=!!(o.snapOn!==false);showPts=!!(o.showPts!==false);showGrid=!!(o.showGrid!==false);
  gridSz=cl(o.gridSz!=null?o.gridSz:50,5,200);gridOpacity=cl(o.gridOpacity!=null?o.gridOpacity:12,0,100);
  set('gridSz',gridSz);syncGridOpUI(gridOpacity);
  setChk('oSnap',snapOn);setChk('oPts',showPts);setChk('oGrid',showGrid);
  colorMode=o.colorMode||'rgb';angleMode=o.angleMode||'deg';
  document.querySelectorAll('#mm button').forEach(b=>b.classList.toggle('on',b.dataset.m===colorMode));
  document.querySelectorAll('#angMM button').forEach(b=>b.classList.toggle('on',b.dataset.a===angleMode));
  syncGridUI();syncOutlinePad(outlinePad);
}

function serializeTplImgs(cb){
  if(!tplImgs.length){cb([]);return;}
  const out=[];let done=0;
  tplImgs.forEach((im,i)=>{
    if(!im.loaded||!im.img){out.push({dataUrl:null,x:im.x,y:im.y,w:im.w,h:im.h,opacity:im.opacity,visible:im.visible,name:im.name||'img'});done++;if(done===tplImgs.length)cb(out);return;}
    try{
      const c=document.createElement('canvas');c.width=im.img.naturalWidth||im.img.width;c.height=im.img.naturalHeight||im.img.height;
      if(c.width&&c.height){const cx=c.getContext('2d');cx.drawImage(im.img,0,0);out.push({dataUrl:c.toDataURL('image/png'),x:im.x,y:im.y,w:im.w,h:im.h,opacity:im.opacity,visible:im.visible,name:im.name||'img'});}
      else out.push({dataUrl:null,x:im.x,y:im.y,w:im.w,h:im.h,opacity:im.opacity,visible:im.visible,name:im.name||'img'});
    }catch(e){out.push({dataUrl:null,x:im.x,y:im.y,w:im.w,h:im.h,opacity:im.opacity,visible:im.visible,name:im.name||'img'});}
    done++;if(done===tplImgs.length)cb(out);
  });
}

function saveStateToStorage(){
  const options=getOptionsFromDOM();
  let maxId=0;shapes.forEach(s=>{if(s.id>maxId)maxId=s.id;});
  serializeTplImgs(tplImgsSerialized=>{
    try{
      const payload=JSON.stringify({shapes:shapes,tplImgsSerialized,options,uid:Math.max(uid,maxId+1)});
      localStorage.setItem(STORAGE_KEY,payload);
    }catch(e){}
  });
}

function loadStateFromStorage(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return false;
    const data=JSON.parse(raw);
    if(data.options){applyOptionsToDOM(data.options);}
    if(Array.isArray(data.shapes)){shapes=data.shapes;selId=null;}
    if(data.uid!=null)uid=Math.max(data.uid,1);
    const list=Array.isArray(data.tplImgsSerialized)?data.tplImgsSerialized:[];
    tplImgs=[];selImgI=-1;

function _posTP(b,tp){
  const br=b.getBoundingClientRect();
  const tw=tp.offsetWidth,bw=b.offsetWidth;
  const margin=8;
  const idealCenterX=br.left+bw/2;
  let left=idealCenterX-tw/2;
  if(left<margin)left=margin;
  if(left+tw>window.innerWidth-margin)left=window.innerWidth-margin-tw;
  const offsetFromBtnLeft=left-br.left;
  tp.style.left=offsetFromBtnLeft+'px';
  tp.style.transform='none';
  const arrow=tp.querySelector('.tp-arrow');
  if(arrow){
    const arrowX=idealCenterX-left;
    arrow.style.left=arrowX+'px';
  }
  if(br.bottom+8+tp.offsetHeight>window.innerHeight-8){tp.style.top='auto';tp.style.bottom='calc(100% + 8px)';}
  else{tp.style.top='';tp.style.bottom='';}
}
function fixTooltips(){
  document.querySelectorAll('.tb,.abtn').forEach(b=>{
    const tp=b.querySelector('.tp');
    if(!tp)return;
    if(!tp.querySelector('.tp-arrow')){
      const arrow=document.createElement('div');
      arrow.className='tp-arrow';
      tp.insertBefore(arrow,tp.firstChild);
    }
    b.addEventListener('mouseenter',()=>{
      tp.classList.remove('tp-show');
      const prevTrans=tp.style.transition;
      tp.style.transition='none';
      _posTP(b,tp);
      void tp.offsetHeight;
      tp.style.transition=prevTrans;
      tp.classList.add('tp-show');
    });
    b.addEventListener('mouseleave',()=>{
      tp.classList.remove('tp-show');
      tp.style.left='';tp.style.top='';tp.style.bottom='';tp.style.transform='';
      const arrow=tp.querySelector('.tp-arrow');
      if(arrow)arrow.style.left='';
    });
  });
}

// ======== SNAP (shape outline + anchors > screen edges > grid) ========
// Snap targets include object bounds and outline (getOutlinePts used in edgeTgts).
function getOutlinePts(s){

function edgeTgts(exId){

function calcSnap(bb,exId,shape){

function snapPt(v,ex,ax){

// ======== HIT ========
function hitB(mx,my,s){let lx=mx,ly=my;const rot=s.rotation||0;if(rot&&!['polygon','star','pixels','text','verticaltext'].includes(s.type)){const[cx,cy]=getC(s);[lx,ly]=rotP(mx,my,cx,cy,-rot);}const pad=Math.max(s.strokeWeight||0,5);

    case'ellipse':case'arc':{const cx=s.x+s.w/2,cy=s.y+s.h/2;return((lx-cx)/(s.w/2+pad))**2+((ly-cy)/(s.h/2+pad))**2<=1;}
    case'circle':return dst(lx,ly,s.px,s.py)<=s.d/2+pad;
    case'triangle':case'quad':{const v=s.verts;return v.length>=3&&(pip(lx,ly,v)||v.some((_,i)=>{const j=(i+1)%v.length;return dstS(lx,ly,...v[i],...v[j])<pad;}));}

    case'polygon':case'star':{const v=s.type==='polygon'?polyV(s.cx,s.cy,s.r,s.sides,s.rotation):starV(s.cx,s.cy,s.oR,s.iR,s.pts,s.rotation);return pip(mx,my,v);}

        if(s.closed&&sg.length>=2)if(dstS(lx,ly,sg[sg.length-1].x,sg[sg.length-1].y,sg[0].x,sg[0].y)<pathPad)return true;
        if(s.closed&&sg.length>=3&&pip(lx,ly,sg.map(p=>[p.x,p.y])))return true;

        const v=s.verts;if(v.length<2)return false;

        if(s.closed&&v.length>=2)if(dstS(lx,ly,v[v.length-1][0],v[v.length-1][1],v[0][0],v[0][1])<pathPad)return true;

}

// ======== RESIZE HANDLES ========
function getResizeHandles(s){
  const b=getPaddedBB(s,outlinePad);if(!b||b.w<2||b.h<2)return[];
  return[
    {n:'rs-tl',x:b.x,y:b.y,cur:'nwse-resize'},
    {n:'rs-tr',x:b.x+b.w,y:b.y,cur:'nesw-resize'},
    {n:'rs-br',x:b.x+b.w,y:b.y+b.h,cur:'nwse-resize'},
    {n:'rs-bl',x:b.x,y:b.y+b.h,cur:'nesw-resize'},
    {n:'rs-t',x:b.x+b.w/2,y:b.y,cur:'ns-resize'},
    {n:'rs-r',x:b.x+b.w,y:b.y+b.h/2,cur:'ew-resize'},
    {n:'rs-b',x:b.x+b.w/2,y:b.y+b.h,cur:'ns-resize'},
    {n:'rs-l',x:b.x,y:b.y+b.h/2,cur:'ew-resize'},

}
function hitResizeHandle(mx,my,s){
  if(!s||['point','pixels'].includes(s.type))return null;
  const handles=getResizeHandles(s);
  for(const h of handles){if(dst(mx,my,h.x,h.y)<RH+4)return h;}
  return null;
}
function drawResizeHandles(s){
  if(!s||['point','pixels'].includes(s.type))return;
  const handles=getResizeHandles(s);
  ctx.save();
  handles.forEach(h=>{
    const isSide=['rs-t','rs-r','rs-b','rs-l'].includes(h.n);
    ctx.beginPath();
    if(isSide){ctx.rect(h.x-4,h.y-4,8,8);}
    else{ctx.rect(h.x-5,h.y-5,10,10);}
    ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#7c3aed';ctx.lineWidth=1.5;ctx.stroke();
  });

}
function applyResize(s,handle,mx,my,shiftKey){

  const hn=handle.n;
  if(hn==='rs-tl'){nx=bb.x+dx;ny=bb.y+dy;nw=bb.w-dx;nh=bb.h-dy;}
  else if(hn==='rs-tr'){ny=bb.y+dy;nw=bb.w+dx;nh=bb.h-dy;}
  else if(hn==='rs-br'){nw=bb.w+dx;nh=bb.h+dy;}
  else if(hn==='rs-bl'){nx=bb.x+dx;nw=bb.w-dx;nh=bb.h+dy;}
  else if(hn==='rs-t'){ny=bb.y+dy;nh=bb.h-dy;}
  else if(hn==='rs-r'){nw=bb.w+dx;}
  else if(hn==='rs-b'){nh=bb.h+dy;}

    else if(hn==='rs-tr'){nw=bb.w+2*dx;nh=bb.h-2*dy;nx=bb.x-dx;ny=bb.y+dy;}
    else if(hn==='rs-br'){nw=bb.w+2*dx;nh=bb.h+2*dy;nx=bb.x-dx;ny=bb.y-dy;}
    else if(hn==='rs-bl'){nw=bb.w-2*dx;nh=bb.h+2*dy;nx=bb.x+dx;ny=bb.y-dy;}

    case'polygon':s.cx=nx+nw/2;s.cy=ny+nh/2;s.r=Math.max(nw,nh)/2;break;
    case'star':s.cx=nx+nw/2;s.cy=ny+nh/2;s.oR=Math.max(nw,nh)/2;s.iR=orig.iR*(s.oR/orig.oR);break;
    case'path':
      if(orig.segs&&orig.segs.length){s.segs=orig.segs.map(p=>{const r2={...p,x:(p.x-bb.x)*sx+nx,y:(p.y-bb.y)*sy+ny};if(p.cx1!=null){r2.cx1=(p.cx1-bb.x)*sx+nx;r2.cy1=(p.cy1-bb.y)*sy+ny;}if(p.cx2!=null){r2.cx2=(p.cx2-bb.x)*sx+nx;r2.cy2=(p.cy2-bb.y)*sy+ny;}return r2;});}

// ======== ANCHORS ========
function getA(s){const rot=s.rotation||0;let pts=[];

function drawAnchors(s,isSel){
  if(isSel&&s.type==='path'&&s.segs&&s.segs.length){
    ctx.save();ctx.lineWidth=2;ctx.setLineDash([3,3]);
    s.segs.forEach(sg=>{
      if(sg.cx1!=null){ctx.strokeStyle='rgba(251,187,51,.9)';ctx.beginPath();ctx.moveTo(sg.x,sg.y);ctx.lineTo(sg.cx1,sg.cy1);ctx.stroke();}
      if(sg.cx2!=null){ctx.strokeStyle='rgba(251,187,51,.9)';ctx.beginPath();ctx.moveTo(sg.x,sg.y);ctx.lineTo(sg.cx2,sg.cy2);ctx.stroke();}
    });
    ctx.setLineDash([]);ctx.restore();
  }
  getA(s).forEach((p,i)=>{const isH=hovPt&&hovPt.sId===s.id&&hovPt.pi===i,isD=mode==='drag-point'&&selId===s.id&&dragPtI===i,isC=p.n==='C',isHandle=p.handle;ctx.save();ctx.beginPath();const r=isD?PHR+1:isH?PHR:isSel?PR:3;if(isHandle){ctx.arc(p.x,p.y,r*.7,0,Math.PI*2);ctx.fillStyle=isH||isD?'#fb3':'#e8a040';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();}else{ctx.arc(p.x,p.y,r,0,Math.PI*2);if(isD){ctx.fillStyle='#2f5';ctx.shadowColor='#2f5';ctx.shadowBlur=8;}else if(isH){ctx.fillStyle='#fb3';ctx.shadowColor='#fb3';ctx.shadowBlur=6;}else if(isSel){ctx.fillStyle=isC?'#e44':'#7c3aed';ctx.globalAlpha=.85;}else{ctx.fillStyle=isC?'rgba(200,80,80,.25)':'rgba(124,58,237,.2)';ctx.globalAlpha=.5;}ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;ctx.strokeStyle=(isD||isH)?'#fff':isSel?'#fffa':'rgba(255,255,255,.15)';ctx.lineWidth=(isD||isH)?2:isSel?1.5:1;ctx.stroke();}if(isH||isD){ctx.fillStyle='#fff';ctx.font='bold 8px system-ui';ctx.textAlign='center';ctx.fillText(p.n,p.x,p.y-r-4);ctx.fillStyle='#888';ctx.font='8px monospace';ctx.fillText(Math.round(p.x)+','+Math.round(p.y),p.x,p.y+r+9);}ctx.restore();});}

// ======== MOUSE ========
function mPos(e){
  const r=cv.getBoundingClientRect();
  const sx=cv.width/r.width,sy=cv.height/r.height;
  const px=(e.clientX-r.left)*sx,py=(e.clientY-r.top)*sy;
  return{x:px,y:py};
}
function applySD(s,dx,dy){if(['polygon','star'].includes(s.type)){s.cx+=dx;s.cy+=dy;}else if(s.type==='circle'||s.type==='point'){s.px+=dx;s.py+=dy;}else if(s.type==='text'||s.type==='verticaltext'){s.tx+=dx;s.ty+=dy;}else if(s.type==='path'){if(s.segs&&s.segs.length)s.segs.forEach(p=>{p.x+=dx;p.y+=dy;if(p.cx1!=null){p.cx1+=dx;p.cy1+=dy;}if(p.cx2!=null){p.cx2+=dx;p.cy2+=dy;}});else if(s.verts)s.verts.forEach(v=>{v[0]+=dx;v[1]+=dy;});}else if(s.bpts){s.bpts.forEach(p=>{p[0]+=dx;p[1]+=dy;});}else if(s.verts){s.verts.forEach(v=>{v[0]+=dx;v[1]+=dy;});}else{s.x+=dx;s.y+=dy;}}

// Try to select a shape under cursor (works with any tool)
function trySelectAt(mx,my){
  for(let i=shapes.length-1;i>=0;i--){
    if(hitB(mx,my,shapes[i])){return shapes[i];}
  }
  return null;
}

cv.addEventListener('mousedown',e=>{
  const m=mPos(e);startMX=m.x;startMY=m.y;

  // Middle-button pan
  if(e.button===1){
    isPanning=true;
    panSX=e.clientX;panSY=e.clientY;
    panOX=panX;panOY=panY;
    e.preventDefault();
    return;
  }

  // Pixel tool
  if(tool==='pixel'){pixelErase=e.button===2;pixelLayer=null;for(let i=shapes.length-1;i>=0;i--)if(shapes[i].type==='pixels'&&shapes[i].gs===gridSz){pixelLayer=shapes[i];selId=pixelLayer.id;break;}if(!pixelLayer&&!pixelErase){saveUndo();pixelLayer=mk('pixels');shapes.push(pixelLayer);selId=pixelLayer.id;}else if(pixelLayer)saveUndo();const gx=Math.floor(m.x/gridSz),gy=Math.floor(m.y/gridSz);if(pixelErase){if(pixelLayer)delete pixelLayer.cells[gx+','+gy];}else if(pixelLayer)pixelLayer.cells[gx+','+gy]=$('dFill').value;mode='drawing';render();return;}
  if(e.button===2||e.altKey){
    let pathPointToDel=null;
    const ph=hitPts(m.x,m.y);
    if(ph){
      const s=shapes.find(sh=>sh.id===ph.sId);
      if(s&&s.type==='path'&&!ph.pt.handle&&ph.pt.n&&ph.pt.n.startsWith('P')){
        const si=parseInt(ph.pt.n.slice(1),10)-1;
        if((s.segs&&s.segs.length>2)||(s.verts&&s.verts.length>2))pathPointToDel={s,si};
      }
    }
    if(!pathPointToDel&&(sel&&sel.type==='path')&&((sel.segs&&sel.segs.length>2)||(sel.verts&&sel.verts.length>2))){
      const s=sel;
      if(s.segs){for(let i=0;i<s.segs.length;i++){if(dst(m.x,m.y,s.segs[i].x,s.segs[i].y)<=PHT){pathPointToDel={s,si:i};break;}}}
      else if(s.verts){for(let i=0;i<s.verts.length;i++){if(dst(m.x,m.y,s.verts[i][0],s.verts[i][1])<=PHT){pathPointToDel={s,si:i};break;}}}
    }
    if(pathPointToDel){saveUndo();const{s,si}=pathPointToDel;if(s.segs)s.segs.splice(si,1);else s.verts.splice(si,1);updateProps();render();return;}
    if(e.button===2){
      if(mode==='pen'&&penPts.length){penPts.pop();render();return;}
      const hit=trySelectAt(m.x,m.y);
      if(hit&&hit.type==='path'&&(hit.segs&&hit.segs.length>2||hit.verts&&hit.verts.length>2)){
        const pathHit=hitPathSegment(m.x,m.y,[hit],50);
        if(pathHit){
          const segIdx=pathHit.segIndex,s=pathHit.shape,sg=s.segs,v=s.verts;
          const ai=pathHit.closedSeg?(sg?sg.length-1:v.length-1):segIdx,bi=pathHit.closedSeg?0:segIdx+1;
          const ax=sg?sg[ai].x:v[ai][0],ay=sg?sg[ai].y:v[ai][1],bx=sg?sg[bi].x:v[bi][0],by=sg?sg[bi].y:v[bi][1];
          const da=dst(m.x,m.y,ax,ay),db=dst(m.x,m.y,bx,by),delI=da<=db?ai:bi;
          saveUndo();if(sg)sg.splice(delI,1);else v.splice(delI,1);updateProps();render();
        }
      }
      if(hit&&hit.type==='brush'){saveUndo();hit.bpts=hit.bpts.filter(p=>dst(m.x,m.y,p[0],p[1])>hit.bsz+5);if(hit.bpts.length<1)rmS(hit.id);render();}
      return;
    }
  }
  
  // Background pan with left button when zoomed and using Select tool (drag empty canvas)
  if(e.button===0 && tool==='select'){
    const bgHit=trySelectAt(m.x,m.y);
    if(!bgHit && selImgI===-1){
      isPanning=true;
      panSX=e.clientX;panSY=e.clientY;
      panOX=panX;panOY=panY;
      e.preventDefault();
      return;
    }
  }

  // Template image selection
  if(tool==='select'&&selImgI>=0){const im=tplImgs[selImgI];if(im&&im.loaded){const cs=[[im.x,im.y],[im.x+im.w,im.y],[im.x+im.w,im.y+im.h],[im.x,im.y+im.h]];for(let ci=0;ci<4;ci++){if(dst(m.x,m.y,cs[ci][0],cs[ci][1])<12){imgDrag={i:selImgI,h:'c',ci,sX:m.x,sY:m.y,oX:im.x,oY:im.y,oW:im.w,oH:im.h};return;}}if(m.x>=im.x&&m.x<=im.x+im.w&&m.y>=im.y&&m.y<=im.y+im.h){imgDrag={i:selImgI,h:'m',sX:m.x,sY:m.y,oX:im.x,oY:im.y};return;}}}
  if(tool==='select'){let sh=false;for(let j=shapes.length-1;j>=0;j--)if(hitB(m.x,m.y,shapes[j])){sh=true;break;}if(!sh)for(let i=tplImgs.length-1;i>=0;i--){const im=tplImgs[i];if(im.visible&&im.loaded&&m.x>=im.x&&m.x<=im.x+im.w&&m.y>=im.y&&m.y<=im.y+im.h){selImgI=i;selId=null;imgDrag={i,h:'m',sX:m.x,sY:m.y,oX:im.x,oY:im.y};updateProps();render();updateImgList();return;}}}

  // Resize / anchor / rotate (any tool; resize/rotate only when outline shown)
  const sel=getSel();
  if(sel&&showOutline){
    const rh=hitResizeHandle(m.x,m.y,sel);
    if(rh){resizeHandle=rh;resizeOrig={bb:getBB(sel),mx:m.x,my:m.y,shape:JSON.parse(JSON.stringify(sel))};mode='resize';if(textEditShapeId&&sel.id===textEditShapeId){const ov=document.getElementById('textEditOverlay');if(ov)ov.classList.add('resizing');}saveUndo();return;}
  }
  const ph=hitPts(m.x,m.y);if(ph){selId=ph.sId;selImgI=-1;mode='drag-point';dragPtI=ph.pi;dragOrig=JSON.parse(JSON.stringify(shapes.find(s2=>s2.id===ph.sId)));saveUndo();showBadge('Drag: '+ph.pt.n);updateProps();render();return;}
  if(sel&&showOutline&&hitRotH(m.x,m.y,sel)){mode='drag-rotate';showBadge('Rotate');return;}

  // Pen tool (add point only on double-click; single-click selects/drags or starts new path)
  if(tool==='pen'&&mode!=='drag-point'&&mode!=='drag-rotate'&&mode!=='resize'){
    if(!penPts.length){
      const penHit=trySelectAt(m.x,m.y);
      if(penHit){selId=penHit.id;selImgI=-1;mode='drag-body';saveUndo();dragOrig=JSON.parse(JSON.stringify(penHit));dragOX=m.x;dragOY=m.y;updateProps();render();return;}
    }
    if(!penPts.length){penPts.push({x:m.x,y:m.y});penDrag=penPts[0];mode='pen';showBadge('Pen: click corners, drag for curves');}
    else if(penPts.length>=2&&dst(m.x,m.y,penPts[0].x,penPts[0].y)<15){penClosing=true;penDrag=penPts[0];}
    else{const pt={x:m.x,y:m.y};penPts.push(pt);penDrag=pt;}
    render();return;
  }

  // Line pen tool (add point only on double-click; single-click selects/drags or starts new path)
  if(tool==='linepen'){
    if(!linePenPts.length){
      const lpHit=trySelectAt(m.x,m.y);
      if(lpHit){selId=lpHit.id;selImgI=-1;mode='drag-body';saveUndo();dragOrig=JSON.parse(JSON.stringify(lpHit));dragOX=m.x;dragOY=m.y;updateProps();render();return;}
      linePenPts.push([m.x,m.y]);linePenPts.push([m.x,m.y]);
    }else{
      if(linePenPts.length>=2 && dst(m.x,m.y,linePenPts[0][0],linePenPts[0][1])<15){
        if(linePenPts.length>2)linePenPts.pop();
        saveUndo();shapes.push(mk('path',{verts:linePenPts.map(p=>[...p]),closed:true,noFill:false}));linePenPts=[];updateProps();render();return;
      }
      linePenPts.push([m.x,m.y]);
    }
    render();return;
  }

  // Brush tool - click existing to continue, non-brush to select, else new
  if(tool==='brush'){
    const hit=trySelectAt(m.x,m.y);
    if(hit&&hit.type==='brush'){selId=hit.id;selImgI=-1;brushActive=true;saveUndo();hit.bpts.push([m.x,m.y]);mode='drawing';render();return;}
    if(hit&&hit.type!=='brush'){selId=hit.id;selImgI=-1;mode='drag-body';saveUndo();dragOrig=JSON.parse(JSON.stringify(hit));dragOX=m.x;dragOY=m.y;updateProps();render();return;}
    brushActive=true;saveUndo();const s=mk('brush',{bpts:[[m.x,m.y]]});shapes.push(s);selId=s.id;mode='drawing';render();return;
  }

  // Any tool: clicking on a shape selects it and starts drag
  const found=trySelectAt(m.x,m.y);
  if(!found&&selId!=null){if(textEditShapeId!=null)commitTextEdit();selId=null;selImgI=-1;mode='idle';updateProps();render();return;}
  if(found){
    selId=found.id;selImgI=-1;
    if(tool==='select'||!['brush','pixel'].includes(tool)){
      mode='drag-body';saveUndo();dragOrig=JSON.parse(JSON.stringify(found));dragOX=m.x;dragOY=m.y;
    }
    updateProps();render();
    if(mode==='drag-body')return;
  }

  // Drawing new shapes
  if(tool==='select'){if(!found){selId=null;selImgI=-1;mode='idle';}updateProps();render();}
  else if(tool==='text'){if(textEditShapeId!=null){commitTextEdit();selId=null;updateProps();render();return;}saveUndo();selImgI=-1;const s=mk('text',{tx:m.x,ty:m.y,fontSize:48});shapes.push(s);selId=s.id;mode='drawing';showBadge('Drag to size text');updateProps();render();}

    panX+=(tx-panX)*0.25;panY+=(ty-panY)*0.25;
    if(Math.abs(panX-tx)<1)panX=tx;
    if(Math.abs(panY-ty)<1)panY=ty;
    clampPan();
    render();
    return;
  }
  const newZoom=cl(targetZoom,MIN_ZOOM,MAX_ZOOM);
  const scale=newZoom/oldZoom;
  panX=vx-(vx-panX)*scale;
  panY=vy-(vy-panY)*scale;
  zoom=newZoom;

}
function zoomFit(){
  if(!cwrap)return;
  const cwr=cwrap.getBoundingClientRect();
  let availW=cwr.width-24,availH=cwr.height-24;
  if(availW<=0||availH<=0){
    zoom=1;panX=0;panY=0;clampPan();render();
    return;
  }
  const fitScale=Math.min(availW/CW,availH/CH);
  const newZoom=Math.min(fitScale,MAX_ZOOM);
  zoom=newZoom;
  panX=(1-zoom)*cwr.width/2;
  panY=(1-zoom)*cwr.height/2;
  clampPan();
  render();
}

function syncCP(){const t=$('colT').value;const s=getSel();let hex=t==='fill'?(s?s.fill:$('dFill').value):(s?s.stroke:$('dStr').value);const[r,g,b]=h2r(hex);

let rawCode='';
function updateCode(){
  const isH=colorMode==='hsl';const isDeg=angleMode==='deg';
  let c='function setup() {\n  createCanvas('+CW+', '+CH+');\n';
  if(isH)c+='  colorMode(HSL, 360, 100, 100, 255);\n';
  if(isDeg)c+='  angleMode(DEGREES);\n';else c+='  angleMode(RADIANS);\n';
  c+='  noLoop();\n}\n\nfunction draw() {\n  background('+hexCode(bgColor)+');\n';
  shapes.forEach(s=>{c+='\n  // '+s.type[0].toUpperCase()+s.type.slice(1)+' #'+s.id+'\n';const rot=s.rotation||0,np=s.opacity<255,needP=np||rot||(gradGlobal&&s.gradOn);if(needP)c+='  push();\n';
    const rotVal=isDeg?r2d(rot).toFixed(2):rot.toFixed(4);
    if(rot&&!['polygon','star','point','pixels','text','verticaltext'].includes(s.type)){const[cx,cy]=getC(s);c+=`  translate(${Math.round(cx)}, ${Math.round(cy)});\n  rotate(${rotVal});\n  translate(${-Math.round(cx)}, ${-Math.round(cy)});\n`;}
    if(gradGlobal&&s.gradOn&&!['line','point','brush','pixels'].includes(s.type)){const b=getBB(s);const ar=isDeg?s.gradAng:d2r(s.gradAng);const arR=d2r(s.gradAng);const len=Math.max(b.w,b.h);const gcx=s.type==='circle'?Math.round(s.px):(s.type==='text'||s.type==='verticaltext')?Math.round(s.tx):Math.round(s.x+(s.w||0)/2),gcy=s.type==='circle'?Math.round(s.py):(s.type==='text'||s.type==='verticaltext')?Math.round(s.ty):Math.round(s.y+(s.h||0)/2);if(s.gradMode==='radial'){const rad=s.gradRad||Math.round(len/2);c+=`  let g=drawingContext.createRadialGradient(${gcx},${gcy},0,${gcx},${gcy},${rad});\n`;}else{c+=`  let g=drawingContext.createLinearGradient(${Math.round(gcx-Math.cos(arR)*len/2)},${Math.round(gcy-Math.sin(arR)*len/2)},${Math.round(gcx+Math.cos(arR)*len/2)},${Math.round(gcy+Math.sin(arR)*len/2)});\n`;}const gStops=s.gradStops&&s.gradStops.length>=2?s.gradStops:[{color:s.gradC1||'#ff0000'},{color:s.gradC2||'#0000ff'}];gStops.forEach((st,idx)=>c+=`  g.addColorStop(${(idx/(gStops.length-1)).toFixed(2)},'${st.color}');\n`);c+=`  drawingContext.fillStyle=g;\n`;}
    else if(!['line','point'].includes(s.type)){if(s.noFill)c+='  noFill();\n';else c+=`  fill(${hexCode(s.fill,np?s.opacity:undefined)});\n`;}
    if(s.noStroke)c+='  noStroke();\n';else c+=`  stroke(${hexCode(s.stroke)});\n  strokeWeight(${s.strokeWeight});\n`;
    switch(s.type){
      case'rect':case'square':{const x=Math.round(s.x),y=Math.round(s.y),w=Math.round(s.w),h=Math.round(s.h);if(s.type==='square'&&w===h&&!s.cr)c+=`  square(${x}, ${y}, ${w});\n`;else c+=s.cr?`  rect(${x}, ${y}, ${w}, ${h}, ${s.cr});\n`:`  rect(${x}, ${y}, ${w}, ${h});\n`;break;}
      case'ellipse':c+=`  ellipse(${Math.round(s.x+s.w/2)}, ${Math.round(s.y+s.h/2)}, ${Math.round(s.w)}, ${Math.round(s.h)});\n`;break;
      case'circle':c+=`  circle(${Math.round(s.px)}, ${Math.round(s.py)}, ${Math.round(s.d)});\n`;break;
      case'arc':{const sa=isDeg?s.sa:d2r(s.sa).toFixed(4);const ea=isDeg?s.ea:d2r(s.ea).toFixed(4);c+=`  arc(${Math.round(s.x+s.w/2)}, ${Math.round(s.y+s.h/2)}, ${Math.round(s.w)}, ${Math.round(s.h)}, ${sa}, ${ea}, ${s.am});\n`;break;}
      case'point':c+=`  strokeWeight(${Math.max(s.strokeWeight,2)});\n  point(${Math.round(s.px)}, ${Math.round(s.py)});\n`;break;
      case'triangle':c+=`  triangle(${s.verts.map(p=>p.map(n=>Math.round(n)).join(', ')).join(', ')});\n`;break;
      case'line':c+=`  line(${s.verts.map(p=>p.map(n=>Math.round(n)).join(', ')).join(', ')});\n`;break;
      case'quad':c+=`  quad(${s.verts.map(p=>p.map(n=>Math.round(n)).join(', ')).join(', ')});\n`;break;
      case'polygon':case'star':{const v=s.type==='polygon'?polyV(s.cx,s.cy,s.r,s.sides,s.rotation):starV(s.cx,s.cy,s.oR,s.iR,s.pts,s.rotation);c+='  beginShape();\n';v.forEach(p=>c+=`  vertex(${Math.round(p[0])}, ${Math.round(p[1])});\n`);c+='  endShape(CLOSE);\n';break;}
      case'path':{
        c+='  beginShape();\n';
        if(s.segs&&s.segs.length){
          const sg=s.segs;c+=`  vertex(${Math.round(sg[0].x)}, ${Math.round(sg[0].y)});\n`;
          for(let i=1;i<sg.length;i++){const pr=sg[i-1],cu=sg[i];if(pr.cx2!=null||cu.cx1!=null){const c1x=pr.cx2!=null?Math.round(pr.cx2):Math.round(pr.x),c1y=pr.cx2!=null?Math.round(pr.cy2):Math.round(pr.y);const c2x=cu.cx1!=null?Math.round(cu.cx1):Math.round(cu.x),c2y=cu.cx1!=null?Math.round(cu.cy1):Math.round(cu.y);c+=`  bezierVertex(${c1x}, ${c1y}, ${c2x}, ${c2y}, ${Math.round(cu.x)}, ${Math.round(cu.y)});\n`;}else c+=`  vertex(${Math.round(cu.x)}, ${Math.round(cu.y)});\n`;}
        }else if(s.verts&&s.verts.length){s.verts.forEach(p=>c+=`  vertex(${Math.round(p[0])}, ${Math.round(p[1])});\n`);}

// ======== ARTBOARD SYSTEM ========
let _artboards = [];        // array of artboard objects
let _activeABId = 0;        // id of currently active artboard
let _abIdCnt = 0;           // counter for generating artboard IDs
let _abMode = 'single';     // 'single' | 'tab' | 'split' | 'browser'

// Split mode state
let _splitDivDrag = null;   // {idx, startX, widths:[]}
let _splitPaneWidths = [];  // current widths in px

// Browser mode state
let _abbPan = { x: 60, y: 60, zoom: 1 };
let _abbDragAB = null;      // {id, startX, startY, origBx, origBy}
let _abbPanning = false;
let _abbPanStart = null;    // {x, y, origX, origY}

// DOM refs
const _abCwrap = document.getElementById('cwrap');
let _abCwrapOrigParent = null;
let _abCwrapOrigNextSib = null;

// ---- artboard helpers ----
function _abGet(id) { return _artboards.find(a => a.id === (id != null ? id : _activeABId)); }

function _abSave() {
  const ab = _abGet(_activeABId);
  if (!ab) return;
  ab.shapes = shapes;
  ab.tplImgs = tplImgs;
  ab.uid = uid;
  ab.CW = CW; ab.CH = CH; ab.bgColor = bgColor;
  ab.zoom = zoom; ab.panX = panX; ab.panY = panY;
}

function _abLoad(ab) {
  if (!ab) return;
  shapes = ab.shapes || [];
  tplImgs = ab.tplImgs || [];
  uid = ab.uid != null ? ab.uid : uid;
  CW = ab.CW || 800; CH = ab.CH || 500; bgColor = ab.bgColor || '#f0f0f0';
  zoom = ab.zoom != null ? ab.zoom : 1;
  panX = ab.panX != null ? ab.panX : 0;
  panY = ab.panY != null ? ab.panY : 0;
  if (cv) { cv.width = CW; cv.height = CH; }
  selId = null; selImgI = -1; mode = 'idle';
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = v; };
  set('cW', CW); set('cH', CH); set('bgC', bgColor);
  applyZoomPan();
}

function _abSwitch(id) {
  if (id === _activeABId) return;
  _abSave();
  _activeABId = id;
  const ab = _abGet(id);
  _abLoad(ab);
  render(); updateCode(); updateLayers(); updateProps(); updateImgList();
  _abRenderTabs();
  if (_abMode === 'split') _abSyncSplitActive();
  if (_abMode === 'browser') _abbSyncActive();
  scheduleSaveState();
}

function _abAdd() {
  _abSave();
  const id = ++_abIdCnt;
  // Place new artboard to the right of the last one in browser mode
  const lastAB = _artboards[_artboards.length - 1];
  const newBx = lastAB ? (lastAB.bx || 80) + (lastAB.CW || 800) + 60 : 80;
  const newBy = lastAB ? (lastAB.by || 80) : 80;
  const ab = {
    id, name: 'Artboard ' + id,
    shapes: [], tplImgs: [], uid: uid,
    CW: CW, CH: CH, bgColor: bgColor,
    zoom: 1, panX: 0, panY: 0,
    bx: newBx, by: newBy
  };
  _artboards.push(ab);
  _activeABId = id;
  _abLoad(ab);
  render(); updateCode(); updateLayers(); updateProps(); updateImgList();
  _abRenderTabs();
  if (_abMode === 'split') _abBuildSplit();
  else if (_abMode === 'browser') { _abbBuild(); setTimeout(()=>document.getElementById('abbZoomFit')&&document.getElementById('abbZoomFit').click(),80); }
  scheduleSaveState();
}

function _abRemove(id) {
  if (_artboards.length <= 1) { alert('Cannot remove the last artboard.'); return; }
  const ab = _abGet(id);
  if (ab && ab.shapes && ab.shapes.length > 0) {
    if (!confirm('Remove artboard "' + ab.name + '"? This will delete all its shapes.')) return;
  }
  const idx = _artboards.findIndex(a => a.id === id);
  if (idx === -1) return;
  _artboards.splice(idx, 1);
  if (_activeABId === id) {
    _activeABId = _artboards[Math.max(0, idx - 1)].id;
    _abLoad(_abGet(_activeABId));
    render(); updateCode(); updateLayers(); updateProps(); updateImgList();
  }
  _abRenderTabs();
  if (_abMode === 'split') _abBuildSplit();
  else if (_abMode === 'browser') _abbBuild();
  scheduleSaveState();
}

function _abRename(id) {
  const ab = _abGet(id);
  if (!ab) return;
  const n = prompt('Rename artboard:', ab.name);
  if (n !== null && n.trim()) {
    ab.name = n.trim();
    _abRenderTabs();
    if (_abMode === 'split') _abBuildSplit();
    else if (_abMode === 'browser') _abbBuild();
  }
}

// ---- mode switching ----
function _abSetMode(mode) {
  if (_abMode === mode) return;
  _abSave();
  // Return cwrap to original position if it was moved
  _abRestoreCwrap();
  _abMode = mode;
  document.querySelectorAll('.ab-mbtn').forEach(b => b.classList.toggle('abm-on', b.dataset.abm === mode));
  const splitWrap = document.getElementById('abSplitWrap');
  const browserWrap = document.getElementById('abBrowserWrap');
  _abCwrap.style.display = '';
  if (splitWrap) splitWrap.style.display = 'none';
  if (browserWrap) browserWrap.style.display = 'none';
  _abRenderTabs();
  if (mode === 'single' || mode === 'tab') {
    _abLoad(_abGet(_activeABId));
    render(); updateCode();
  } else if (mode === 'split') {
    _abCwrap.style.display = 'none';
    if (splitWrap) { splitWrap.style.display = 'flex'; _abBuildSplit(); }
  } else if (mode === 'browser') {
    _abCwrap.style.display = 'none';
    if (browserWrap) {
      browserWrap.style.display = 'flex';
      _abbBuild();
      // Auto-fit all artboards into view when first entering browser mode
      setTimeout(() => { document.getElementById('abbZoomFit') && document.getElementById('abbZoomFit').click(); }, 80);
    }
  }
  scheduleSaveState();
}

// ---- tab rendering ----
function _abRenderTabs() {
  const container = document.getElementById('abtabs');
  if (!container) return;
  container.innerHTML = '';
  _artboards.forEach(ab => {
    const tab = document.createElement('div');
    tab.className = 'abtab' + (ab.id === _activeABId ? ' abt-act' : '');
    tab.title = 'Double-click to rename';
    const lbl = document.createElement('span');
    lbl.textContent = ab.name;
    lbl.addEventListener('dblclick', e => { e.stopPropagation(); _abRename(ab.id); });
    tab.appendChild(lbl);
    tab.addEventListener('click', e => {
      if (!e.target.classList.contains('abtab-close')) {
        if (_abMode !== 'browser') _abSwitch(ab.id);
        else { _abSave(); _activeABId = ab.id; _abLoad(_abGet(ab.id)); _abbSyncActive(); _abRenderTabs(); render(); updateCode(); updateLayers(); updateProps(); }
      }
    });
    if (_artboards.length > 1) {
      const cls = document.createElement('button');
      cls.className = 'abtab-close';
      cls.textContent = '×';
      cls.title = 'Remove artboard';
      cls.addEventListener('click', e => { e.stopPropagation(); _abRemove(ab.id); });
      tab.appendChild(cls);
    }
    container.appendChild(tab);
  });
}

// ---- preview rendering (renders ab to a target canvas) ----
function _abRenderPreview(ab, targetCanvas) {
  if (!ab || !targetCanvas) return;
  const cw = ab.CW || 800, ch = ab.CH || 500;
  // save all globals that render() uses
  const sv = {
    shapes, tplImgs, CW, CH, bgColor, zoom, panX, panY,
    selId, hovShapeId, hovPt, snapGuides, mode: mode,
    textEditShapeId, penPts, linePenPts, pxHov
  };
  shapes = ab.shapes || [];
  tplImgs = ab.tplImgs || [];
  CW = cw; CH = ch; bgColor = ab.bgColor || '#f0f0f0';
  zoom = 1; panX = 0; panY = 0;
  selId = null; hovShapeId = null; hovPt = null;
  snapGuides = { v: [], h: [] };
  const prevMode = mode; mode = 'idle';
  textEditShapeId = null; penPts = []; linePenPts = []; pxHov = null;
  cv.width = cw; cv.height = ch;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,cw,ch);
  ctx.fillStyle = bgColor; ctx.fillRect(0,0,cw,ch);
  if (showGrid) {
    ctx.save(); ctx.strokeStyle='rgba(0,0,0,'+(0.5*gridOpacity/100)+')'; ctx.lineWidth=1;
    for(let x=0;x<=cw;x+=gridSz){ctx.beginPath();ctx.moveTo(x+.5,0);ctx.lineTo(x+.5,ch);ctx.stroke();}
    for(let y=0;y<=ch;y+=gridSz){ctx.beginPath();ctx.moveTo(0,y+.5);ctx.lineTo(cw,y+.5);ctx.stroke();}
    ctx.restore();
  }
  tplImgs.forEach(im => { if(!im.visible||!im.loaded)return; ctx.save();ctx.globalAlpha=im.opacity;ctx.drawImage(im.img,im.x,im.y,im.w,im.h);ctx.restore(); });
  shapes.forEach(s => drawS(s));
  targetCanvas.width = cw; targetCanvas.height = ch;
  targetCanvas.getContext('2d').drawImage(cv, 0, 0);
  // restore globals
  shapes = sv.shapes; tplImgs = sv.tplImgs;
  CW = sv.CW; CH = sv.CH; bgColor = sv.bgColor;
  zoom = sv.zoom; panX = sv.panX; panY = sv.panY;
  selId = sv.selId; hovShapeId = sv.hovShapeId; hovPt = sv.hovPt;
  snapGuides = sv.snapGuides; mode = sv.mode;
  textEditShapeId = sv.textEditShapeId; penPts = sv.penPts; linePenPts = sv.linePenPts; pxHov = sv.pxHov;
  cv.width = sv.CW; cv.height = sv.CH;
  ctx.setTransform(1,0,0,1,0,0);
  // Re-render active artboard after restoration
  render();
}

// ---- cwrap helpers (move it in/out of split/browser containers) ----
function _abSaveCwrapPos() {
  if (!_abCwrapOrigParent) {
    _abCwrapOrigParent = _abCwrap.parentNode;
    _abCwrapOrigNextSib = _abCwrap.nextSibling;
  }
}
function _abRestoreCwrap() {
  if (_abCwrapOrigParent && _abCwrap.parentNode !== _abCwrapOrigParent) {
    if (_abCwrapOrigNextSib && _abCwrapOrigNextSib.parentNode === _abCwrapOrigParent) {
      _abCwrapOrigParent.insertBefore(_abCwrap, _abCwrapOrigNextSib);
    } else {
      _abCwrapOrigParent.appendChild(_abCwrap);
    }
  }
  _abCwrap.style.flex = '';
  _abCwrap.style.width = '';
  _abCwrap.style.height = '';
  _abCwrap.style.display = '';
}
function _abPlaceCwrapIn(container) {
  _abSaveCwrapPos();
  container.appendChild(_abCwrap);
  _abCwrap.style.flex = '1';
  _abCwrap.style.width = '100%';
  _abCwrap.style.height = '100%';
  _abCwrap.style.display = 'flex';
}

// ---- SPLIT MODE ----
function _abBuildSplit() {
  const wrap = document.getElementById('abSplitWrap');
  if (!wrap) return;
  wrap.innerHTML = '';
  _splitPaneWidths = _artboards.map(() => 400);
  _artboards.forEach((ab, i) => {
    if (i > 0) {
      const div = document.createElement('div');
      div.className = 'ab-split-divider';
      div.dataset.divIdx = i - 1;
      div.addEventListener('mousedown', _abSplitDivStart);
      wrap.appendChild(div);
    }
    const pane = document.createElement('div');
    pane.className = 'ab-split-pane' + (ab.id === _activeABId ? ' absp-act' : '');
    pane.id = 'absp-' + ab.id;
    pane.style.width = _splitPaneWidths[i] + 'px';
    const label = document.createElement('div');
    label.className = 'ab-split-label';
    const nameSpan = document.createElement('span');
    nameSpan.className = 'ab-split-label-name';
    nameSpan.textContent = ab.name;
    nameSpan.addEventListener('dblclick', () => _abRename(ab.id));
    label.appendChild(nameSpan);
    // Zoom controls for each pane
    const zoomBar = document.createElement('div');
    zoomBar.className = 'ab-split-zoom';
    ['−','+',' Fit','100%'].forEach((lbl, zi) => {
      const btn = document.createElement('button');
      btn.textContent = lbl.trim();
      btn.title = ['Zoom out','Zoom in','Fit canvas','Reset zoom'][zi];
      btn.addEventListener('click', e => {
        e.stopPropagation();
        if (ab.id !== _activeABId) { _abSwitch(ab.id); return; }
        if (zi === 0) zoomStep(-1);
        else if (zi === 1) zoomStep(1);
        else if (zi === 2) zoomFit();
        else { zoom=1;panX=0;panY=0;clampPan();render(); }
      });
      zoomBar.appendChild(btn);
    });
    pane.appendChild(label);
    const cwrapDiv = document.createElement('div');
    cwrapDiv.className = 'ab-split-cwrap';
    cwrapDiv.style.position = 'relative';
    cwrapDiv.style.flex = '1';
    cwrapDiv.style.overflow = 'hidden';
    if (ab.id === _activeABId) {
      _abPlaceCwrapIn(cwrapDiv);
    } else {
      const previewWrap = document.createElement('div');
      previewWrap.className = 'ab-split-preview-wrap';
      const previewCanvas = document.createElement('canvas');
      previewCanvas.className = 'ab-split-preview-canvas';
      previewWrap.appendChild(previewCanvas);
      cwrapDiv.appendChild(previewWrap);
      previewWrap.addEventListener('click', () => _abSwitch(ab.id));
      // Render preview after DOM is ready
      setTimeout(() => _abRenderPreview(ab, previewCanvas), 0);
    }
    pane.appendChild(cwrapDiv);
    pane.appendChild(zoomBar);
    wrap.appendChild(pane);
  });
}

function _abSyncSplitActive() {
  document.querySelectorAll('.ab-split-pane').forEach(p => p.classList.remove('absp-act'));
  const activePane = document.getElementById('absp-' + _activeABId);
  if (!activePane) { _abBuildSplit(); return; }
  activePane.classList.add('absp-act');
  const cwrapDiv = activePane.querySelector('.ab-split-cwrap');
  if (cwrapDiv && !cwrapDiv.contains(_abCwrap)) {
    // Remove preview wrap if it was there
    const prevWrap = cwrapDiv.querySelector('.ab-split-preview-wrap');
    if (prevWrap) prevWrap.remove();
    _abPlaceCwrapIn(cwrapDiv);
  }
  // Update previews for other panes
  _artboards.forEach(ab => {
    if (ab.id === _activeABId) return;
    const pane = document.getElementById('absp-' + ab.id);
    if (!pane) return;
    const cwrapDivOther = pane.querySelector('.ab-split-cwrap');
    if (!cwrapDivOther) return;
    // Make sure cwrap is not in this pane
    if (cwrapDivOther.contains(_abCwrap)) {
      cwrapDivOther.innerHTML = '';
    }
    let previewWrap = cwrapDivOther.querySelector('.ab-split-preview-wrap');
    if (!previewWrap) {
      previewWrap = document.createElement('div');
      previewWrap.className = 'ab-split-preview-wrap';
      const previewCanvas = document.createElement('canvas');
      previewCanvas.className = 'ab-split-preview-canvas';
      previewWrap.appendChild(previewCanvas);
      cwrapDivOther.appendChild(previewWrap);
      previewWrap.addEventListener('click', () => _abSwitch(ab.id));
    }
    const pc = previewWrap.querySelector('canvas');
    if (pc) setTimeout(() => _abRenderPreview(ab, pc), 10);
  });
}

function _abSplitDivStart(e) {
  e.preventDefault();
  const idx = parseInt(e.currentTarget.dataset.divIdx);
  const panes = document.querySelectorAll('.ab-split-pane');
  const widths = Array.from(panes).map(p => p.getBoundingClientRect().width);
  _splitDivDrag = { idx, startX: e.clientX, widths: widths.slice() };
  e.currentTarget.classList.add('absd-on');
  const el = e.currentTarget;
  function onMove(ev) {
    if (!_splitDivDrag) return;
    const dx = ev.clientX - _splitDivDrag.startX;
    const lw = Math.max(180, _splitDivDrag.widths[_splitDivDrag.idx] + dx);
    const rw = Math.max(180, _splitDivDrag.widths[_splitDivDrag.idx + 1] - dx);
    const panes2 = document.querySelectorAll('.ab-split-pane');
    if (panes2[_splitDivDrag.idx]) panes2[_splitDivDrag.idx].style.width = lw + 'px';
    if (panes2[_splitDivDrag.idx + 1]) panes2[_splitDivDrag.idx + 1].style.width = rw + 'px';
    clampPan(); render();
  }
  function onUp() {
    _splitDivDrag = null;
    el.classList.remove('absd-on');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ---- BROWSER MODE ----
function _abbBuild() {
  const stage = document.getElementById('abBrowserStage');
  if (!stage) return;
  stage.innerHTML = '';
  _abbApplyTransform();
  _artboards.forEach(ab => {
    const el = document.createElement('div');
    el.className = 'ab-browser-ab' + (ab.id === _activeABId ? ' abb-act' : '');
    el.id = 'abbb-' + ab.id;
    el.style.left = (ab.bx || 80) + 'px';
    el.style.top = (ab.by || 80) + 'px';
    el.style.width = (ab.CW || 800) + 'px';
    // Header
    const hdr = document.createElement('div');
    hdr.className = 'ab-browser-hdr';
    const nm = document.createElement('span');
    nm.textContent = ab.name;
    nm.addEventListener('dblclick', e => { e.stopPropagation(); _abRename(ab.id); });
    hdr.appendChild(nm);
    const rnBtn = document.createElement('button');
    rnBtn.textContent = '✎'; rnBtn.title = 'Rename';
    rnBtn.addEventListener('click', e => { e.stopPropagation(); _abRename(ab.id); });
    hdr.appendChild(rnBtn);
    if (_artboards.length > 1) {
      const rmBtn = document.createElement('button');
      rmBtn.textContent = '×'; rmBtn.title = 'Remove artboard';
      rmBtn.style.color = '#a33';
      rmBtn.addEventListener('click', e => { e.stopPropagation(); _abRemove(ab.id); });
      hdr.appendChild(rmBtn);
    }
    // Drag artboard by header
    hdr.addEventListener('mousedown', e => {
      if (e.target.tagName === 'BUTTON') return;
      e.stopPropagation();
      e.preventDefault();
      const startX = e.clientX, startY = e.clientY;
      const origBx = ab.bx || 0, origBy = ab.by || 0;
      _abbDragAB = { id: ab.id, startX, startY, origBx, origBy };
      function onMove(ev) {
        if (!_abbDragAB) return;
        const dx = (ev.clientX - startX) / _abbPan.zoom;
        const dy = (ev.clientY - startY) / _abbPan.zoom;
        ab.bx = origBx + dx; ab.by = origBy + dy;
        el.style.left = ab.bx + 'px'; el.style.top = ab.by + 'px';
      }
      function onUp() {
        _abbDragAB = null;
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        scheduleSaveState();
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    // Click header to activate artboard
    hdr.addEventListener('click', e => {
      if (e.target.tagName === 'BUTTON') return;
      if (ab.id !== _activeABId) {
        _abSave(); _activeABId = ab.id;
        _abLoad(_abGet(ab.id)); render(); updateCode(); updateLayers(); updateProps(); updateImgList();
        _abRenderTabs(); _abbSyncActive(); scheduleSaveState();
      }
    });
    el.appendChild(hdr);
    // Canvas area
    const carea = document.createElement('div');
    carea.className = 'ab-browser-canvas-wrap';
    carea.style.width = (ab.CW || 800) + 'px';
    carea.style.height = (ab.CH || 500) + 'px';
    if (ab.id === _activeABId) {
      _abPlaceCwrapIn(carea);
    } else {
      const previewCanvas = document.createElement('canvas');
      previewCanvas.style.cssText = 'display:block;cursor:pointer';
      carea.appendChild(previewCanvas);
      carea.addEventListener('click', () => {
        _abSave(); _activeABId = ab.id;
        _abLoad(_abGet(ab.id)); render(); updateCode(); updateLayers(); updateProps(); updateImgList();
        _abRenderTabs(); _abbSyncActive(); scheduleSaveState();
      });
      setTimeout(() => _abRenderPreview(ab, previewCanvas), 0);
    }
    el.appendChild(carea);
    stage.appendChild(el);
  });
}

function _abbSyncActive() {
  document.querySelectorAll('.ab-browser-ab').forEach(el => el.classList.remove('abb-act'));
  const activeEl = document.getElementById('abbb-' + _activeABId);
  if (!activeEl) { _abbBuild(); return; }
  activeEl.classList.add('abb-act');
  const carea = activeEl.querySelector('.ab-browser-canvas-wrap');
  if (carea && !carea.contains(_abCwrap)) {
    // Clear any preview canvas before placing cwrap
    carea.innerHTML = '';
    _abPlaceCwrapIn(carea);
  }
  // Update previews for others
  _artboards.forEach(ab => {
    if (ab.id === _activeABId) return;
    const el = document.getElementById('abbb-' + ab.id);
    if (!el) return;
    const ca = el.querySelector('.ab-browser-canvas-wrap');
    if (!ca) return;
    if (ca.contains(_abCwrap)) { ca.innerHTML = ''; }
    let pc = ca.querySelector('canvas');
    if (!pc) {
      pc = document.createElement('canvas');
      pc.style.cssText = 'display:block;width:100%;height:auto;cursor:pointer';
      ca.appendChild(pc);
      ca.addEventListener('click', () => {
        _abSave(); _activeABId = ab.id;
        _abLoad(_abGet(ab.id)); render(); updateCode(); updateLayers(); updateProps(); updateImgList();
        _abRenderTabs(); _abbSyncActive(); scheduleSaveState();
      });
    }
    setTimeout(() => _abRenderPreview(ab, pc), 10);
  });
}

function _abbApplyTransform() {
  const stage = document.getElementById('abBrowserStage');
  if (stage) stage.style.transform = `translate(${_abbPan.x}px, ${_abbPan.y}px) scale(${_abbPan.zoom})`;
}

// Browser panning and zooming
(function() {
  const bwrap = document.getElementById('abBrowserWrap');
  if (!bwrap) return;
  bwrap.addEventListener('mousedown', e => {
    // Pan when clicking: the bwrap background, the stage background, or middle mouse button on anything
    const clickedAB = e.target.closest('.ab-browser-ab');
    const isMid = e.button === 1;
    const isLeft = e.button === 0;
    if (!isMid && isLeft && clickedAB) return; // let artboard handle it
    if (!isMid && !isLeft) return;
    _abbPanning = true;
    _abbPanStart = { x: e.clientX, y: e.clientY, origX: _abbPan.x, origY: _abbPan.y };
    e.preventDefault();
  });
  bwrap.addEventListener('mousemove', e => {
    if (!_abbPanning || !_abbPanStart) return;
    _abbPan.x = _abbPanStart.origX + (e.clientX - _abbPanStart.x);
    _abbPan.y = _abbPanStart.origY + (e.clientY - _abbPanStart.y);
    _abbApplyTransform();
  });
  bwrap.addEventListener('mouseup', () => { _abbPanning = false; _abbPanStart = null; });
  bwrap.addEventListener('mouseleave', () => { _abbPanning = false; _abbPanStart = null; });
  bwrap.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : (1/1.1);
    const rect = bwrap.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const newZoom = Math.max(0.1, Math.min(4, _abbPan.zoom * factor));
    _abbPan.x = mx - (mx - _abbPan.x) * (newZoom / _abbPan.zoom);
    _abbPan.y = my - (my - _abbPan.y) * (newZoom / _abbPan.zoom);
    _abbPan.zoom = newZoom;
    _abbApplyTransform();
  }, { passive: false });
  const abbZoomIn = document.getElementById('abbZoomIn');
  const abbZoomOut = document.getElementById('abbZoomOut');
  const abbZoomFit = document.getElementById('abbZoomFit');
  const abbZoom100 = document.getElementById('abbZoom100');
  if (abbZoomIn) abbZoomIn.addEventListener('click', () => { _abbPan.zoom = Math.min(4, _abbPan.zoom * 1.2); _abbApplyTransform(); });
  if (abbZoomOut) abbZoomOut.addEventListener('click', () => { _abbPan.zoom = Math.max(0.1, _abbPan.zoom / 1.2); _abbApplyTransform(); });
  if (abbZoom100) abbZoom100.addEventListener('click', () => { _abbPan.zoom = 1; _abbApplyTransform(); });
  if (abbZoomFit) abbZoomFit.addEventListener('click', () => {
    if (!_artboards.length) return;
    const bwr = bwrap.getBoundingClientRect();
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    _artboards.forEach(ab => {
      const bx = ab.bx||80, by = ab.by||80, cw = ab.CW||800, ch = ab.CH||500;
      minX = Math.min(minX, bx); minY = Math.min(minY, by);
      maxX = Math.max(maxX, bx + cw); maxY = Math.max(maxY, by + ch + 24);
    });
    const pad = 40;
    const scaleX = (bwr.width - pad*2) / (maxX - minX);
    const scaleY = (bwr.height - pad*2) / (maxY - minY);
    _abbPan.zoom = Math.max(0.1, Math.min(4, Math.min(scaleX, scaleY)));
    _abbPan.x = pad - minX * _abbPan.zoom;
    _abbPan.y = pad - minY * _abbPan.zoom;
    _abbApplyTransform();
  });
})();

// ---- mode button event listeners ----
document.querySelectorAll('.ab-mbtn').forEach(b => {
  b.addEventListener('click', () => _abSetMode(b.dataset.abm));
});
document.getElementById('abAddBtn').addEventListener('click', () => _abAdd());

// ---- update saveStateToStorage and loadStateFromStorage to handle artboards ----
// Wrap the originals
const _origSaveState = saveStateToStorage;
saveStateToStorage = function() {
  _abSave(); // save current editor state to active artboard
  const options = getOptionsFromDOM();
  let maxId = 0; shapes.forEach(s => { if(s.id > maxId) maxId = s.id; });
  serializeTplImgs(tplImgsSerialized => {
    // Also serialize all artboard tplImgs
    const abData = _artboards.map(ab => ({
      id: ab.id, name: ab.name,
      shapes: ab.shapes || [],
      uid: ab.uid,
      CW: ab.CW, CH: ab.CH, bgColor: ab.bgColor,
      zoom: ab.zoom, panX: ab.panX, panY: ab.panY,
      bx: ab.bx, by: ab.by
      // NOTE: tplImgs (template/reference images) are not serialized per artboard.
      // Only the active artboard's tplImgs are saved via the main tplImgsSerialized field.
      // Per-artboard tplImgs are stored in-memory in ab.tplImgs but are not persisted across reloads.
    }));
    try {
      const payload = JSON.stringify({
        shapes, tplImgsSerialized, options,
        uid: Math.max(uid, maxId+1),
        artboards: abData,
        activeABId: _activeABId,
        abIdCnt: _abIdCnt,
        abMode: _abMode
      });
      localStorage.setItem(STORAGE_KEY, payload);
    } catch(e) {}
  });
};
// Override exportSaveJSON
const _origExportSave = exportSaveJSON;
exportSaveJSON = function() {
  _abSave();
  const options = getOptionsFromDOM();
  let maxId = 0; shapes.forEach(s => { if(s.id > maxId) maxId = s.id; });
  serializeTplImgs(tplImgsSerialized => {
    const abData = _artboards.map(ab => ({
      id: ab.id, name: ab.name,
      shapes: ab.shapes || [],
      uid: ab.uid,
      CW: ab.CW, CH: ab.CH, bgColor: ab.bgColor,
      zoom: ab.zoom, panX: ab.panX, panY: ab.panY,
      bx: ab.bx, by: ab.by
    }));
    const payload = {
      shapes, tplImgsSerialized, options,
      uid: Math.max(uid, maxId+1),
      artboards: abData,
      activeABId: _activeABId,
      abIdCnt: _abIdCnt
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'shape-designer-save.json'; a.click(); URL.revokeObjectURL(a.href);
  });
};

// ---- init artboards after load ----
function _abInit(data) {
  if (data && Array.isArray(data.artboards) && data.artboards.length > 0) {
    _artboards = data.artboards.map(ab => ({
      id: ab.id || 1,
      name: ab.name || 'Artboard 1',
      shapes: ab.shapes || [],
      tplImgs: ab.tplImgs || [],
      uid: ab.uid || 1,
      CW: ab.CW || 800, CH: ab.CH || 500,
      bgColor: ab.bgColor || '#f0f0f0',
      zoom: ab.zoom != null ? ab.zoom : 1,
      panX: ab.panX || 0, panY: ab.panY || 0,
      bx: ab.bx != null ? ab.bx : 80, by: ab.by != null ? ab.by : 80
    }));
    _abIdCnt = data.abIdCnt || Math.max(..._artboards.map(a => a.id));
    _activeABId = data.activeABId || _artboards[0].id;
    // Sync active artboard with current global state (already loaded by loadStateFromStorage)
    const activeAB = _abGet(_activeABId);
    if (activeAB) {
      activeAB.shapes = shapes;
      activeAB.tplImgs = tplImgs;
      activeAB.uid = uid;
      activeAB.CW = CW; activeAB.CH = CH; activeAB.bgColor = bgColor;
    }
  } else {
    // First run or old format - create single artboard from current state
    _abIdCnt = 1;
    _artboards = [{
      id: 1, name: 'Artboard 1',
      shapes: shapes, tplImgs: tplImgs, uid: uid,
      CW: CW, CH: CH, bgColor: bgColor,
      zoom: zoom, panX: panX, panY: panY,
      bx: 80, by: 80
    }];
    _activeABId = 1;
  }
  _abSaveCwrapPos(); // remember where cwrap lives originally
  _abRenderTabs();
}

if(!loadStateFromStorage()){$('cmLbl').textContent='RGB DEG';syncCP();render();updateImgList();}
(function(){
  let savedData = null;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) savedData = JSON.parse(raw);
  } catch(e) {}
  _abInit(savedData);
  $('cmLbl').textContent = colorMode.toUpperCase() + ' ' + angleMode.toUpperCase();
})();
